name: Evaluation before deployment

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Build release images after the full evaluation gate"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  full-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: Evaluate all A-D configurations in-process
        env:
          LLM_PROVIDER: extractive
          VECTOR_STORE: memory
          MLFLOW_TRACKING_URI: file:./mlruns
        run: python -m evaluation.run_experiments --config evaluation/configs/local.yaml --fail-on-regression
      - uses: actions/upload-artifact@v4
        with:
          name: full-evaluation-report
          path: |
            evaluation/results/
            mlruns/

  release-images:
    if: inputs.deploy
    needs: full-evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
