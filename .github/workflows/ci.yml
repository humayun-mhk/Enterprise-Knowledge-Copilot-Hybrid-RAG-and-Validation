name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Lint
        run: ruff check backend evaluation scripts
      - name: Type-check application
        run: mypy backend/app --ignore-missing-imports
      - name: Run backend tests with coverage
        env:
          LLM_PROVIDER: extractive
          VECTOR_STORE: memory
        run: pytest backend/tests --cov=backend/app --cov-report=term-missing --cov-fail-under=70
      - name: Run evaluator tests
        run: pytest evaluation/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build

  benchmark-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate benchmark schema and size
        run: python scripts/validate_benchmark.py --minimum 200

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, benchmark-contract]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: enterprise-knowledge-copilot-api:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: enterprise-knowledge-copilot-web:ci

  evaluation-gate:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: Run deterministic smoke evaluation
        env:
          LLM_PROVIDER: extractive
          VECTOR_STORE: memory
          MLFLOW_TRACKING_URI: file:./mlruns
        run: python -m evaluation.run_experiments --config evaluation/configs/ci.yaml --fail-on-regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report
          path: evaluation/results/
